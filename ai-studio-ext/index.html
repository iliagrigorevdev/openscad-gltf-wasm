<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Standalone SCAD Preview Tester</title>
    <style>
      body {
        display: flex;
        height: 100vh;
        margin: 0;
        font-family: sans-serif;
        background: #222;
        color: white;
      }
      #editor {
        width: 40%;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }
      textarea {
        flex-grow: 1;
        font-family: monospace;
        font-size: 14px;
        padding: 10px;
        margin-bottom: 10px;
        background: #333;
        color: #0f0;
        border: 1px solid #555;
      }
      button {
        padding: 10px;
        font-size: 16px;
        cursor: pointer;
        background: #00aaff;
        color: white;
        border: none;
        font-weight: bold;
      }
      button:hover {
        background: #0088cc;
      }
      iframe {
        width: 60%;
        height: 100%;
        border: none;
        border-left: 2px solid #444;
      }
    </style>
  </head>
  <body>
    <div id="editor">
      <h2>SCAD Input</h2>
      <textarea id="scad-code">
// Test your SCAD code here!
$fn=50;
difference() {
    cube([20, 20, 20], center=true);
    sphere(r=12);
}
      </textarea>
      <button id="render-btn">Render 3D</button>
    </div>

    <!-- This loads your exact extension preview file -->
    <iframe id="preview-frame" src="preview.html"></iframe>

    <script>
      const renderBtn = document.getElementById("render-btn");
      const iframe = document.getElementById("preview-frame");
      const scadCode = document.getElementById("scad-code");

      renderBtn.onclick = () => {
        const code = scadCode.value.trim();
        // Send the code to the iframe to render
        iframe.contentWindow.postMessage(
          {
            type: "RENDER_SCAD",
            code: code,
          },
          "*",
        );
      };
    </script>
  </body>
</html>
